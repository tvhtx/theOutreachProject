<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonate | Sign In</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: var(--space-lg);
            position: relative;
            overflow: hidden;
        }

        /* Ambient glow */
        .auth-container::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(232, 132, 95, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--ink-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: var(--space-2xl);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardIn 0.5s var(--ease-out) forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        .auth-logo-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-glow);
        }

        .auth-logo-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .auth-logo span {
            font-family: var(--font-display);
            font-size: var(--font-size-2xl);
            color: var(--text-primary);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: var(--font-size-2xl);
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }

        .auth-subtitle {
            color: var(--text-tertiary);
            font-size: var(--font-size-sm);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .auth-form label {
            font-size: var(--font-size-xs);
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .auth-form input {
            padding: 12px var(--space-md);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-family: inherit;
            transition: all var(--transition-fast);
            background: var(--ink-lighter);
            color: var(--text-primary);
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-primary-light);
            background: var(--ink-surface);
        }

        .auth-form input::placeholder {
            color: var(--text-muted);
        }

        .auth-submit {
            margin-top: var(--space-md);
            padding: 14px var(--space-lg);
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: var(--font-size-base);
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: 0 2px 16px var(--accent-primary-glow);
        }

        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px var(--accent-primary-glow);
        }

        .auth-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-xl);
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border-light);
            color: var(--text-tertiary);
            font-size: var(--font-size-sm);
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            color: var(--accent-warm);
        }

        .auth-error {
            background: var(--accent-error-light);
            color: var(--accent-error);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            display: none;
            animation: shake 0.5s ease;
            border: 1px solid rgba(232, 107, 107, 0.2);
        }

        .auth-error.visible {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 45px;
        }

        .password-toggle button {
            position: absolute;
            right: var(--space-sm);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: var(--space-xs);
        }

        .password-toggle button:hover {
            color: var(--text-primary);
        }

        .forgot-link {
            text-align: right;
            margin-top: -8px;
        }

        .forgot-link a {
            font-size: var(--font-size-sm);
            color: var(--accent-primary);
            text-decoration: none;
        }

        .forgot-link a:hover {
            color: var(--accent-warm);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" />
                        </svg>
                    </div>
                    <span>Resonate</span>
                </div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to continue to your dashboard</p>
            </div>

            <div class="auth-error" id="authError"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required
                            minlength="8">
                        <button type="button" id="togglePassword" tabindex="-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="forgot-link">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <button type="submit" class="auth-submit" id="submitBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        const getApiBaseUrl = () => {
            if (window.location.hostname.includes('onrender.com')) {
                return window.location.origin + '/api';
            }
            const customApiUrl = localStorage.getItem('apiBaseUrl');
            if (customApiUrl) return customApiUrl;
            return 'http://localhost:5000/api';
        };
        const API_BASE = getApiBaseUrl();

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('authError');
        const submitBtn = document.getElementById('submitBtn');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        // Check if already logged in
        const token = localStorage.getItem('authToken');
        if (token) {
            fetch(`${API_BASE}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => {
                    if (res.ok) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('authToken');
                    }
                })
                .catch(() => localStorage.removeItem('authToken'));
        }

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            errorDiv.classList.remove('visible');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('visible');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
